<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Web Fighter</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* SCHERMATA DI GIOCO (HOST) */
        #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 10px;
            position: relative;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-top: 10px;
        }
        .health-bar-container {
            width: 45%;
            background: #333;
            border: 3px solid #fff;
            height: 30px;
            position: relative;
        }
        .health-bar {
            width: 100%;
            height: 100%;
            background: #ff003c;
            transition: width 0.1s ease;
        }
        .player-label {
            position: absolute;
            top: -20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        #p1-label { left: 0; }
        #p2-label { right: 0; }

        #canvas-container {
            width: 100%;
            max-width: 800px;
            height: 60vh;
            border: 4px solid #fff;
            background: linear-gradient(to bottom, #1a052e, #0c0014);
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Overlay d'attesa QR Code */
        #lobby-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        #qrcode {
            background: white;
            padding: 10px;
            margin: 20px 0;
            border-radius: 5px;
        }

        /* CONTROLLER SULLO SCHERMO (Per Giocatore 1 su Host e per Giocatore 2 su Remote) */
        .controller-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 10px;
            gap: 20px;
        }
        .dpad, .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .btn {
            background: #222;
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            touch-action: manipulation;
        }
        .btn:active {
            background: #fff;
            color: #000;
        }
        .btn-empty {
            visibility: hidden;
        }

        /* SCHERMATA CONTROLLER (CLIENT) */
        #controller-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #111;
            padding: 20px;
        }
        #controller-status {
            margin-bottom: 30px;
            font-size: 1.2rem;
            text-align: center;
        }

        /* Winner Screen */
        #winner-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        #winner-text {
            font-size: 3rem;
            color: #ff003c;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff003c;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="hud">
            <div class="health-bar-container">
                <span class="player-label" id="p1-label">P1 (Tu)</span>
                <div class="health-bar" id="p1-health"></div>
            </div>
            <div class="health-bar-container">
                <span class="player-label" id="p2-label">P2 (In Attesa...)</span>
                <div class="health-bar" id="p2-health"></div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <div id="lobby-overlay">
                <h2>RETRO FIGHTER</h2>
                <p style="margin-top: 10px;">Inquadra per connettere il Giocatore 2:</p>
                <div id="qrcode"></div>
                <p style="font-size: 0.8rem; color: #888;">Assicurati che entrambi i telefoni siano connessi a Internet</p>
            </div>

            <div id="winner-screen">
                <div id="winner-text">P1 VINCE!</div>
                <button class="btn" onclick="resetGame()">Rigoca</button>
            </div>
        </div>

        <div class="controller-container" id="p1-touch-controls">
            <div class="dpad">
                <button class="btn" id="btn-left">◀</button>
                <button class="btn btn-empty"></button>
                <button class="btn" id="btn-right">▶</button>
            </div>
            <div class="action-buttons">
                <button class="btn" id="btn-punch">P</button>
                <button class="btn" id="btn-kick">K</button>
                <button class="btn" id="btn-block">B</button>
            </div>
        </div>
    </div>

    <div id="controller-screen">
        <div id="controller-status">Connessione al gioco in corso...</div>
        <div class="controller-container" style="flex-direction: column; align-items: center; gap: 40px;">
            <div class="dpad" style="width: 100%; max-width: 400px;">
                <button class="btn" id="c-btn-left" style="padding: 30px;">◀</button>
                <button class="btn btn-empty"></button>
                <button class="btn" id="c-btn-right" style="padding: 30px;">▶</button>
            </div>
            <div class="action-buttons" style="width: 100%; max-width: 400px;">
                <button class="btn" id="c-btn-punch" style="padding: 30px; background: #ff003c;">PUNGO</button>
                <button class="btn" id="c-btn-kick" style="padding: 30px; background: #ffaa00;">CALCIO</button>
                <button class="btn" id="c-btn-block" style="padding: 30px; background: #0088ff;">PARATA</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAZIONE E SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Adatta la risoluzione del canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Stati di input dei giocatori
        const inputState = {
            p1: { left: false, right: false, punch: false, kick: false, block: false },
            p2: { left: false, right: false, punch: false, kick: false, block: false }
        };

        // --- CLASSE PERSONAGGIO ---
        class Fighter {
            constructor(x, y, color, side) {
                this.startX = x;
                this.y = y;
                this.color = color;
                this.side = side; // 'left' o 'right'
                
                this.width = 60;
                this.height = 130;
                this.x = x;
                this.vx = 0;
                this.speed = 4;
                
                this.health = 100;
                this.state = 'idle'; // 'idle', 'walking', 'punching', 'kicking', 'blocking', 'hit'
                this.stateTimer = 0;
            }

            reset() {
                this.x = this.startX;
                this.health = 100;
                this.state = 'idle';
                this.stateTimer = 0;
            }

            update(inputs, opponent) {
                if (this.health <= 0) return;

                // Gestione degli stati temporanei (attacchi e animazione colpo subito)
                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) {
                        this.state = 'idle';
                    }
                }

                // Se non si è bloccati in un'animazione d'attacco o di danno ricevuto
                if (this.state !== 'punching' && this.state !== 'kicking' && this.state !== 'hit') {
                    // Parata
                    if (inputs.block) {
                        this.state = 'blocking';
                        this.vx = 0;
                    } else {
                        this.state = 'idle';
                        // Movimento
                        if (inputs.left) {
                            this.vx = -this.speed;
                            this.state = 'walking';
                        } else if (inputs.right) {
                            this.vx = this.speed;
                            this.state = 'walking';
                        } else {
                            this.vx = 0;
                        }

                        // Attacchi
                        if (inputs.punch) {
                            this.state = 'punching';
                            this.stateTimer = 15; // Frame di durata dell'attacco
                            this.vx = 0;
                            this.checkHit(opponent, 10, 70); // 10 Danni, range 70px
                        } else if (inputs.kick) {
                            this.state = 'kicking';
                            this.stateTimer = 20;
                            this.vx = 0;
                            this.checkHit(opponent, 15, 90); // 15 Danni, range 90px
                        }
                    }
                }

                // Aggiorna posizione ed evita l'uscita dallo schermo
                this.x += this.vx;
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;
            }

            checkHit(opponent, damage, range) {
                // Calcola distanza tra i due combattenti
                const selfCenter = this.x + this.width / 2;
                const oppCenter = opponent.x + opponent.width / 2;
                const distance = Math.abs(selfCenter - oppCenter);

                // Controllo se l'avversario è nel raggio d'azione ed è rivolto verso di lui
                if (distance < range) {
                    if (opponent.state === 'blocking') {
                        // Colpo parato: danno ridotto al minimo
                        opponent.takeDamage(damage * 0.1);
                    } else {
                        opponent.takeDamage(damage);
                    }
                }
            }

            takeDamage(amount) {
                this.health -= amount;
                if (this.health < 0) this.health = 0;
                this.state = 'hit';
                this.stateTimer = 10; // Stun da colpo
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;

                // Disegna corpo principale (Cambia forma in base allo stato)
                let drawHeight = this.height;
                let drawY = canvas.height - this.height - 20; // Offset dal terreno

                if (this.state === 'blocking') {
                    ctx.fillStyle = '#555'; // Diventa grigio in parata
                }

                // Corpo
                ctx.fillRect(this.x, drawY, this.width, drawHeight);

                // Testa
                ctx.fillStyle = '#ffdbac';
                ctx.fillRect(this.x + (this.side === 'left' ? 15 : 5), drawY - 35, 40, 35);

                // Arti/Attacchi visivi
                ctx.fillStyle = this.color;
                if (this.state === 'punching') {
                    ctx.fillStyle = '#ff0000';
                    let punchX = this.side === 'left' ? this.x + this.width : this.x - 30;
                    ctx.fillRect(punchX, drawY + 30, 30, 15); // Pugno teso
                } else if (this.state === 'kicking') {
                    ctx.fillStyle = '#ffaa00';
                    let kickX = this.side === 'left' ? this.x + this.width : this.x - 40;
                    ctx.fillRect(kickX, drawY + 70, 40, 20); // Calcio teso
                } else if (this.state === 'hit') {
                    ctx.fillStyle = '#fff'; // Lampeggia di bianco se colpito
                    ctx.fillRect(this.x, drawY, this.width, drawHeight);
                }

                ctx.restore();
            }
        }

        // Istanza dei combattenti
        const player1 = new Fighter(100, 0, '#00ffcc', 'left');
        const player2 = new Fighter(500, 0, '#ff00ff', 'right');

        // --- RETE E CONNESSIONE MULTIPLAYER (PEERJS) ---
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role'); // Controlla se siamo "host" o "controller"
        let peer = null;
        let conn = null;

        if (role === 'controller') {
            // COMPORTAMENTO CONTROLLER (GIOCATORE 2)
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';
            
            const targetPeerId = urlParams.get('room');
            peer = new Peer();

            peer.on('open', () => {
                document.getElementById('controller-status').innerText = "Connessione alla console...";
                conn = peer.connect(targetPeerId);
                
                conn.on('open', () => {
                    document.getElementById('controller-status').innerText = "CONNESSO! Usa i comandi sotto.";
                    document.getElementById('controller-status').style.color = "#00ffcc";
                });

                conn.on('close', () => {
                    document.getElementById('controller-status').innerText = "Disconnesso.";
                    document.getElementById('controller-status').style.color = "#ff0000";
                });
            });

            // Assegna eventi touch ai pulsanti del controller remoto
            bindTouchButton('c-btn-left', 'left');
            bindTouchButton('c-btn-right', 'right');
            bindTouchButton('c-btn-punch', 'punch');
            bindTouchButton('c-btn-kick', 'kick');
            bindTouchButton('c-btn-block', 'block');

        } else {
            // COMPORTAMENTO CONSOLE DI GIOCO (HOST & GIOCATORE 1)
            peer = new Peer();
            
            peer.on('open', (id) => {
                // Genera il link per il controller del Giocatore 2
                const controllerUrl = `${window.location.href.split('?')[0]}?role=controller&room=${id}`;
                
                // Genera QR Code all'interno dell'overlay
                new QRCode(document.getElementById("qrcode"), {
                    text: controllerUrl,
                    width: 180,
                    height: 180
                });
            });

            peer.on('connection', (connection) => {
                conn = connection;
                document.getElementById('lobby-overlay').style.display = 'none';
                document.getElementById('p2-label').innerText = "P2 (Connesso)";
                
                // Ricezione comandi dal Giocatore 2
                conn.on('data', (data) => {
                    if (data.type === 'INPUT') {
                        inputState.p2 = data.inputs;
                    }
                });
            });

            // Assegna eventi touch locali per il Giocatore 1
            bindTouchButton('btn-left', 'left', 'p1');
            bindTouchButton('btn-right', 'right', 'p1');
            bindTouchButton('btn-punch', 'punch', 'p1');
            bindTouchButton('btn-kick', 'kick', 'p1');
            bindTouchButton('btn-block', 'block', 'p1');

            // Avvia loop del gioco sul terminale Host
            requestAnimationFrame(gameLoop);
        }

        // --- SISTEMA DI INPUT (TOUCH & KEYBOARD) ---
        function bindTouchButton(elementId, action, targetPlayer = null) {
            const btn = document.getElementById(elementId);
            
            const startPress = (e) => {
                e.preventDefault();
                if (targetPlayer) {
                    inputState[targetPlayer][action] = true;
                } else if (conn && conn.open) {
                    // Se siamo sul controller remoto, spediamo lo stato all'Host
                    inputState.p2[action] = true;
                    sendInputs();
                }
            };

            const endPress = (e) => {
                e.preventDefault();
                if (targetPlayer) {
                    inputState[targetPlayer][action] = false;
                } else if (conn && conn.open) {
                    inputState.p2[action] = false;
                    sendInputs();
                }
            };

            btn.addEventListener('touchstart', startPress);
            btn.addEventListener('touchend', endPress);
            // Fallback per test su PC con mouse
            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('mouseup', endPress);
        }

        function sendInputs() {
            if (conn && conn.open) {
                conn.send({
                    type: 'INPUT',
                    inputs: inputState.p2
                });
            }
        }

        // Supporto Tastiera PC (Per testare l'Host rapidamente)
        window.addEventListener('keydown', (e) => {
            if (role === 'controller') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') inputState.p1.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') inputState.p1.right = true;
            if (e.key === 'f') inputState.p1.punch = true;
            if (e.key === 'g') inputState.p1.kick = true;
            if (e.key === 'h') inputState.p1.block = true;
        });

        window.addEventListener('keyup', (e) => {
            if (role === 'controller') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') inputState.p1.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') inputState.p1.right = false;
            if (e.key === 'f') inputState.p1.punch = false;
            if (e.key === 'g') inputState.p1.kick = false;
            if (e.key === 'h') inputState.p1.block = false;
        });


        // --- LOOP DI GIOCO PRINCIPALE ---
        let gameOver = false;

        function gameLoop() {
            if (role === 'controller') return; // Solo la console fa girare il motore grafico

            updatePhysics();
            drawFrame();

            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            if (gameOver) return;

            // Aggiorna personaggi
            player1.update(inputState.p1, player2);
            player2.update(inputState.p2, player1);

            // Impedisce che si scavalchino (opzionale, ma migliora l'effetto scontro)
            if (player1.x + player1.width > player2.x) {
                const overlap = (player1.x + player1.width) - player2.x;
                player1.x -= overlap / 2;
                player2.x += overlap / 2;
            }

            // Aggiorna graficamente le barre salute nel DOM
            document.getElementById('p1-health').style.width = `${player1.health}%`;
            document.getElementById('p2-health').style.width = `${player2.health}%`;

            // Controllo fine partita
            if (player1.health <= 0 || player2.health <= 0) {
                endGame();
            }
        }

        function drawFrame() {
            // Sfondo
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Disegna Terreno retro
            ctx.fillStyle = '#2d004d';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#ff0055';
            ctx.fillRect(0, canvas.height - 23, canvas.width, 3); // Linea neon sul pavimento

            // Disegna combattenti
            player1.draw();
            player2.draw();
        }

        function endGame() {
            gameOver = true;
            const winnerText = document.getElementById('winnerText');
            const screen = document.getElementById('winner-screen');
            
            let msg = "";
            if (player1.health === player2.health) {
                msg = "PAREGGIO!";
            } else if (player1.health > player2.health) {
                msg = "GIOCATORE 1 VINCE!";
            } else {
                msg = "GIOCATORE 2 VINCE!";
            }
            
            document.getElementById('winner-text').innerText = msg;
            screen.style.display = 'flex';
        }

        function resetGame() {
            player1.reset();
            player2.reset();
            gameOver = false;
            document.getElementById('winner-screen').style.display = 'none';
        }
    </script>
</body>
</html>
