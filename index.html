<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Shadow Fighter P2P</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #050110;
            --neon-p1: #00ffcc;
            --neon-p1-dim: rgba(0, 255, 204, 0.3);
            --neon-p2: #ff00ff;
            --neon-p2-dim: rgba(255, 0, 255, 0.3);
            --neon-text: #fff;
            --ui-border: #444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Disabilita zoom e scroll touch */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-text);
            font-family: 'Verdana', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- SCHERMATA DI GIOCO (HOST) --- */
        #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 10px;
            position: relative;
        }

        /* HUD: Barre Salute */
        #hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            z-index: 2;
        }
        .health-bar-container {
            width: 45%;
            background: #111;
            border: 2px solid var(--ui-border);
            height: 35px;
            position: relative;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff003c, #ff5500);
            transition: width 0.2s ease-out;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.3);
        }
        .health-bar.p1-bar { background: linear-gradient(to right, #0088aa, var(--neon-p1)); }
        .health-bar.p2-bar { background: linear-gradient(to right, #aa00aa, var(--neon-p2)); }

        .player-label {
            position: absolute;
            top: -22px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #fff;
        }
        #p1-label { left: 5px; color: var(--neon-p1); }
        #p2-label { right: 5px; color: var(--neon-p2); }

        /* Area Canvas */
        #canvas-container {
            width: 100%;
            max-width: 1000px;
            height: 60vh;
            border: 3px solid #222;
            background: radial-gradient(circle at center, #1a053d 0%, #050110 100%);
            position: relative;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Overlay d'attesa QR Code */
        #lobby-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 1, 16, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
        }
        #lobby-overlay h2 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-p1), 0 0 20px var(--neon-p2);
            margin-bottom: 10px;
        }
        
        /* Container del QR Code fisso e visibile */
        #qrcode-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.7);
            width: 210px;
            height: 210px;
        }
        #qrcode-img {
            display: block;
            width: 180px;
            height: 180px;
            border: none;
        }

        #controller-link {
            color: var(--neon-p1);
            text-decoration: underline;
            font-size: 0.8rem;
            margin-top: 10px;
            word-break: break-all;
            max-width: 80%;
            cursor: pointer;
        }

        /* Schermata Vittoria */
        #winner-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        #winner-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-p1), 0 0 30px var(--neon-p2);
        }

        /* Gestione caricamento avatar */
        .avatar-upload-btn {
            background: #222;
            border: 2px dashed #444;
            color: #aaa;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-block;
            transition: all 0.2s;
        }
        .avatar-upload-btn:active {
            background: #333;
            border-color: #fff;
        }

        /* --- STILIZZAZIONE PULSANTI TOUCH --- */
        .controller-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            padding: 15px;
            gap: 20px;
            z-index: 2;
        }
        .dpad, .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .btn {
            background: #111;
            border: 2px solid var(--ui-border);
            color: #888;
            font-size: 1.5rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; /* Pulsanti rotondi */
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #000;
        }
        /* Feedback pressione pulsanti P1 (Host) */
        #p1-touch-controls .btn:active {
            background: #222;
            border-color: var(--neon-p1);
            color: var(--neon-p1);
            box-shadow: 0 0 15px var(--neon-p1-dim), inset 0 0 5px var(--neon-p1);
            transform: translateY(2px);
        }
        .btn-empty { visibility: hidden; }

        /* Pulsanti d'azione specifici */
        .btn-punch { color: #ff5555; }
        .btn-kick { color: #ffaa00; }
        .btn-block { color: #55aaff; }

        /* --- SCHERMATA CONTROLLER (CLIENT) --- */
        #controller-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #100a25 0%, #050110 100%);
            padding: 20px;
        }
        #controller-status {
            font-size: 1.1rem;
            text-align: center;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Stilizzazione pulsanti P2 (Remote) */
        #controller-screen .controller-container .btn {
            width: 90px; height: 90px; /* Più grandi sul controller */
            font-size: 2rem;
        }
        #controller-screen .btn:active {
            border-color: var(--neon-p2);
            color: var(--neon-p2);
            box-shadow: 0 0 20px var(--neon-p2-dim), inset 0 0 10px var(--neon-p2);
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="hud">
            <div class="health-bar-container">
                <span class="player-label" id="p1-label">P1 (Tu)</span>
                <div class="health-bar p1-bar" id="p1-health"></div>
            </div>
            <div class="health-bar-container">
                <span class="player-label" id="p2-label">P2 (In Attesa...)</span>
                <div class="health-bar p2-bar" id="p2-health"></div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <div id="lobby-overlay">
                <h2>NEON SHADOWS</h2>
                <p style="color: #ccc; font-size: 0.9rem;">Scansiona per connettere il Giocatore 2:</p>
                <div id="qrcode-container">
                    <img id="qrcode-img" src="" alt="Generazione QR Code..." />
                </div>
                <p id="loading-text" style="color: #ffaa00; font-size: 0.8rem;">Generazione codice di gioco...</p>
                <a id="controller-link" target="_blank" style="display:none;">Oppure clicca/copia questo link per il P2</a>
            </div>

            <div id="winner-screen">
                <div id="winner-text">P1 VINCE!</div>
                <button class="btn" style="width: auto; padding: 0 30px; border-radius: 10px;" onclick="resetGame()">Rigoca</button>
            </div>
        </div>

        <div style="text-align: center; width: 100%;">
            <label class="avatar-upload-btn" for="p1-avatar-input">📸 Carica tua foto (P1)</label>
            <input type="file" id="p1-avatar-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(this, 'p1')">
        </div>

        <div class="controller-container" id="p1-touch-controls">
            <div class="dpad">
                <button class="btn" id="btn-left">◀</button>
                <button class="btn btn-empty"></button>
                <button class="btn" id="btn-right">▶</button>
            </div>
            <div class="action-buttons">
                <button class="btn btn-punch" id="btn-punch">P</button>
                <button class="btn btn-kick" id="btn-kick">K</button>
                <button class="btn btn-block" id="btn-block">B</button>
            </div>
        </div>
    </div>

    <div id="controller-screen">
        <div style="text-align: center; margin-top: 20px;">
            <div id="controller-status" style="margin-bottom: 15px;">Inizializzazione...</div>
            <label class="avatar-upload-btn" for="p2-avatar-input" style="border-color: var(--neon-p2);">📸 Scegli la tua foto (P2)</label>
            <input type="file" id="p2-avatar-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(this, 'p2')">
        </div>
        
        <div class="controller-container" style="flex-direction: column; align-items: center; gap: 40px; margin-bottom: 30px;">
            <div class="dpad" style="width: 100%; max-width: 400px; justify-content: center;">
                <button class="btn" id="c-btn-left">◀</button>
                <button class="btn btn-empty"></button>
                <button class="btn" id="c-btn-right">▶</button>
            </div>
            <div class="action-buttons" style="width: 100%; max-width: 450px; grid-template-columns: repeat(3, 1fr);">
                <button class="btn btn-punch" id="c-btn-punch">PUNGO</button>
                <button class="btn btn-block" id="c-btn-block">PARATA</button>
                <button class="btn btn-kick" id="c-btn-kick">CALCIO</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAZIONE E SETUP CANVAS ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const LOGICAL_WIDTH = 1000;
        const LOGICAL_HEIGHT = 600;

        function resizeCanvas() {
            canvas.width = LOGICAL_WIDTH;
            canvas.height = LOGICAL_HEIGHT;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const inputState = {
            p1: { left: false, right: false, punch: false, kick: false, block: false },
            p2: { left: false, right: false, punch: false, kick: false, block: false }
        };

        let particles = [];
        function createHitParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 20 + Math.random() * 10,
                    color: color
                });
            }
        }

        // Variabili per salvare le immagini dei volti tagliati
        const playerAvatars = {
            p1: null, // Oggetto Image
            p2: null  // Oggetto Image
        };

        // Funzione per ritagliare a cerchio l'immagine caricata
        function handleAvatarUpload(input, playerKey) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Creiamo un canvas di supporto per ritagliare la faccia in un cerchio
                    const cropCanvas = document.createElement('canvas');
                    const size = 150; // Dimensione dell'avatar ritagliato
                    cropCanvas.width = size;
                    cropCanvas.height = size;
                    const cropCtx = cropCanvas.getContext('2d');

                    // Calcolo ritaglio al centro (mantenendo le proporzioni quadrate)
                    const minDim = Math.min(img.width, img.height);
                    const sx = (img.width - minDim) / 2;
                    const sy = (img.height - minDim) / 2;

                    // Disegniamo il ritaglio a cerchio
                    cropCtx.beginPath();
                    cropCtx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
                    cropCtx.clip();
                    cropCtx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);

                    // Salviamo l'immagine finale elaborata
                    const croppedImg = new Image();
                    croppedImg.onload = function() {
                        if (playerKey === 'p1') {
                            playerAvatars.p1 = croppedImg;
                        } else {
                            // Se siamo il controller remoto P2, salviamo e inviamo l'immagine a P1 tramite P2P
                            playerAvatars.p2 = croppedImg;
                            if (conn && conn.open) {
                                conn.send({
                                    type: 'AVATAR',
                                    dataUrl: cropCanvas.toDataURL('image/png')
                                });
                            }
                        }
                    };
                    croppedImg.src = cropCanvas.toDataURL('image/png');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- CLASSE PERSONAGGIO STILIZZATA (Shadow/Neon con Face-Mapping) ---
        class Fighter {
            constructor(x, y, color, side, playerKey) {
                this.startX = x;
                this.groundY = y;
                this.mainColor = color;
                this.side = side;
                this.playerKey = playerKey; // 'p1' o 'p2'
                
                this.width = 70;
                this.height = 160;
                this.x = x;
                this.y = y - this.height;
                
                this.vx = 0;
                this.speed = 6;
                
                this.health = 100;
                this.state = 'idle';
                this.stateTimer = 0;
                this.animFrame = 0;
            }

            reset() {
                this.x = this.startX;
                this.health = 100;
                this.state = 'idle';
                this.stateTimer = 0;
                this.vx = 0;
            }

            update(inputs, opponent) {
                if (this.health <= 0) return;

                this.animFrame++;

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) {
                        this.state = 'idle';
                    }
                }

                if (this.state !== 'punching' && this.state !== 'kicking' && this.state !== 'hit') {
                    if (inputs.block) {
                        this.state = 'blocking';
                        this.vx = 0;
                    } else {
                        if (inputs.left) {
                            this.vx = -this.speed;
                            this.state = 'walking';
                        } else if (inputs.right) {
                            this.vx = this.speed;
                            this.state = 'walking';
                        } else {
                            this.vx = 0;
                            this.state = 'idle';
                        }

                        if (inputs.punch) {
                            this.state = 'punching';
                            this.stateTimer = 12;
                            this.vx = 0;
                            this.checkHit(opponent, 8, 90, '#ff5555');
                        } else if (inputs.kick) {
                            this.state = 'kicking';
                            this.stateTimer = 18;
                            this.vx = 0;
                            this.checkHit(opponent, 12, 110, '#ffaa00');
                        }
                    }
                }

                this.x += this.vx;
                
                if (this.x < 20) this.x = 20;
                if (this.x > LOGICAL_WIDTH - this.width - 20) this.x = LOGICAL_WIDTH - this.width - 20;
            }

            checkHit(opponent, damage, range, particleColor) {
                const selfCenter = this.x + this.width / 2;
                const oppCenter = opponent.x + opponent.width / 2;
                const distance = Math.abs(selfCenter - oppCenter);

                if (distance < range) {
                    let hitX = opponent.x + opponent.width/2;
                    let hitY = opponent.y + opponent.height/2;

                    if (opponent.state === 'blocking') {
                        opponent.takeDamage(damage * 0.1, false);
                        createHitParticles(hitX, hitY, '#55aaff');
                    } else {
                        opponent.takeDamage(damage, true);
                        createHitParticles(hitX, hitY, particleColor);
                    }
                }
            }

            takeDamage(amount, shouldStun) {
                this.health -= amount;
                if (this.health < 0) this.health = 0;
                
                if (shouldStun) {
                    this.state = 'hit';
                    this.stateTimer = 15;
                    this.vx = (this.side === 'left' ? -2 : 2);
                }
            }

            draw() {
                ctx.save();
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.mainColor;
                ctx.strokeStyle = this.mainColor;
                ctx.lineWidth = 4;
                ctx.fillStyle = '#000';

                if (this.state === 'hit') {
                    ctx.strokeStyle = '#fff'; ctx.shadowColor = '#fff';
                } else if (this.state === 'punching' || this.state === 'kicking') {
                    ctx.strokeStyle = '#ff3333'; ctx.shadowColor = '#ff3333';
                } else if (this.state === 'blocking') {
                    ctx.strokeStyle = '#55aaff'; ctx.shadowColor = '#55aaff';
                }

                const centerX = this.x + this.width / 2;
                const centerY = this.y;

                // --- DISEGNO TESTA (O FOTO CARICATA) ---
                const avatar = playerAvatars[this.playerKey];
                const headRadius = 22;
                const headCenterY = centerY + 25;

                if (avatar) {
                    // Rimuove l'ombra durante il disegno della foto per non opacizzarla
                    ctx.save();
                    ctx.shadowBlur = 0;
                    ctx.drawImage(avatar, centerX - headRadius, headCenterY - headRadius, headRadius * 2, headRadius * 2);
                    ctx.restore();
                    // Bordo al neon sopra la faccia
                    ctx.beginPath();
                    ctx.arc(centerX, headCenterY, headRadius, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    // Testa standard
                    ctx.beginPath();
                    ctx.arc(centerX, headCenterY, headRadius - 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                // Busto
                ctx.beginPath();
                ctx.moveTo(centerX, centerY + 45);
                ctx.lineTo(centerX, centerY + 100);
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.lineWidth = 4;

                // Gambe
                ctx.beginPath();
                ctx.moveTo(centerX, centerY + 100);
                ctx.lineTo(centerX - 15, centerY + 160);
                ctx.moveTo(centerX, centerY + 100);
                ctx.lineTo(centerX + 15, centerY + 160);
                ctx.stroke();

                // Braccia
                ctx.beginPath();
                const shoulderY = centerY + 55;
                const armLength = 40;
                
                if (this.state === 'punching' && this.stateTimer > 4) {
                    ctx.moveTo(centerX, shoulderY);
                    const punchDir = this.side === 'left' ? 1 : -1;
                    ctx.lineTo(centerX + armLength * punchDir * 1.5, shoulderY);
                } else if (this.state === 'blocking') {
                    ctx.moveTo(centerX, shoulderY - 10);
                    ctx.lineTo(centerX + (this.side === 'left' ? 15 : -15), shoulderY + 20);
                    ctx.moveTo(centerX, shoulderY - 10);
                    ctx.lineTo(centerX + (this.side === 'left' ? 20 : -20), shoulderY + 15);
                } else if (this.state === 'kicking' && this.stateTimer > 5) {
                    ctx.strokeStyle = ctx.shadowColor;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY + 100);
                    ctx.lineTo(centerX - (this.side === 'left' ? 20 : -20), centerY + 160);
                    ctx.moveTo(centerX, centerY + 90);
                    const kickDir = this.side === 'left' ? 1 : -1;
                    ctx.lineTo(centerX + armLength * kickDir * 1.8, centerY + 80);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, shoulderY); ctx.lineTo(centerX - 10, shoulderY + 30);
                } else {
                    const bob = (this.state === 'walking' ? Math.sin(this.animFrame * 0.2) * 3 : 0);
                    ctx.moveTo(centerX, shoulderY);
                    ctx.lineTo(centerX + (this.side === 'left' ? 10 : -10), shoulderY + 30 + bob);
                    ctx.moveTo(centerX, shoulderY);
                    ctx.lineTo(centerX + (this.side === 'left' ? 15 : -15), shoulderY + 25 - bob);
                }
                ctx.stroke();

                ctx.restore();
            }
        }

        const GROUND_Y_LOGIC = LOGICAL_HEIGHT - 40;
        const player1 = new Fighter(150, GROUND_Y_LOGIC, '#00ffcc', 'left', 'p1');
        const player2 = new Fighter(780, GROUND_Y_LOGIC, '#ff00ff', 'right', 'p2');

        // --- RETE E CONNESSIONE MULTIPLAYER ---
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        let peer = null;
        let conn = null;

        if (role === 'controller') {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';
            
            const targetPeerId = urlParams.get('room');
            const statusDiv = document.getElementById('controller-status');
            peer = new Peer();

            peer.on('open', () => {
                statusDiv.innerText = "Connessione alla console...";
                conn = peer.connect(targetPeerId);
                
                conn.on('open', () => {
                    statusDiv.innerText = "CONNESSO! Sei il Giocatore 2";
                    statusDiv.style.color = '#ff00ff';
                });

                conn.on('close', () => {
                    statusDiv.innerText = "Disconnesso.";
                    statusDiv.style.color = "#ff0000";
                });
            });

            bindTouchButton('c-btn-left', 'left');
            bindTouchButton('c-btn-right', 'right');
            bindTouchButton('c-btn-punch', 'punch');
            bindTouchButton('c-btn-kick', 'kick');
            bindTouchButton('c-btn-block', 'block');

        } else {
            peer = new Peer();
            
            peer.on('open', (id) => {
                const baseUrl = window.location.href.split('?')[0];
                const controllerUrl = `${baseUrl}?role=controller&room=${id}`;
                
                document.getElementById('loading-text').innerText = "In attesa che P2 si colleghi...";
                const altLink = document.getElementById('controller-link');
                altLink.href = controllerUrl;
                altLink.style.display = "block";

                const qrImg = document.getElementById("qrcode-img");
                const encodedUrl = encodeURIComponent(controllerUrl);
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodedUrl}`;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                document.getElementById('lobby-overlay').style.display = 'none';
                const p2Label = document.getElementById('p2-label');
                p2Label.innerText = "P2 (Connesso)";
                p2Label.style.color = '#ff00ff';
                
                resetGame();

                conn.on('data', (data) => {
                    if (data.type === 'INPUT') {
                        inputState.p2 = data.inputs;
                    } else if (data.type === 'AVATAR') {
                        // Quando P2 invia la sua foto, la carichiamo nel gioco principale
                        const tempImg = new Image();
                        tempImg.onload = function() {
                            playerAvatars.p2 = tempImg;
                        };
                        tempImg.src = data.dataUrl;
                    }
                });
            });

            bindTouchButton('btn-left', 'left', 'p1');
            bindTouchButton('btn-right', 'right', 'p1');
            bindTouchButton('btn-punch', 'punch', 'p1');
            bindTouchButton('btn-kick', 'kick', 'p1');
            bindTouchButton('btn-block', 'block', 'p1');

            requestAnimationFrame(gameLoop);
        }

        // --- SISTEMA DI INPUT ---
        function bindTouchButton(elementId, action, targetPlayer = null) {
            const btn = document.getElementById(elementId);
            if(!btn) return;
            
            const startPress = (e) => {
                e.preventDefault();
                if (targetPlayer) {
                    inputState[targetPlayer][action] = true;
                } else if (conn && conn.open) {
                    inputState.p2[action] = true;
                    sendInputs();
                }
            };

            const endPress = (e) => {
                e.preventDefault();
                if (targetPlayer) {
                    inputState[targetPlayer][action] = false;
                } else if (conn && conn.open) {
                    inputState.p2[action] = false;
                    sendInputs();
                }
            };

            btn.addEventListener('pointerdown', startPress);
            btn.addEventListener('pointerup', endPress);
            btn.addEventListener('pointercancel', endPress);
            btn.addEventListener('pointerleave', endPress);
        }

        let lastSendTime = 0;
        function sendInputs() {
            if (conn && conn.open) {
                const now = Date.now();
                if (now - lastSendTime > 16) { 
                    conn.send({
                        type: 'INPUT',
                        inputs: inputState.p2
                    });
                    lastSendTime = now;
                }
            }
        }

        // Supporto tastiera PC
        if (role !== 'controller') {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') inputState.p1.left = true;
                if (e.key === 'ArrowRight' || e.key === 'd') inputState.p1.right = true;
                if (e.key === 'f') inputState.p1.punch = true;
                if (e.key === 'g') inputState.p1.kick = true;
                if (e.key === 'h') inputState.p1.block = true;
            });

            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') inputState.p1.left = false;
                if (e.key === 'ArrowRight' || e.key === 'd') inputState.p1.right = false;
                if (e.key === 'f') inputState.p1.punch = false;
                if (e.key === 'g') inputState.p1.kick = false;
                if (e.key === 'h') inputState.p1.block = false;
            });
        }

        // --- LOOP DI GIOCO ---
        let gameOver = false;
        let gameFrame = 0;

        function gameLoop() {
            if (role === 'controller') return;

            gameFrame++;
            updatePhysics();
            drawFrame();

            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            if (gameOver) return;

            player1.update(inputState.p1, player2);
            player2.update(inputState.p2, player1);

            // Evita collisione troppo vicina (i due giocatori non si appiccicano)
            const minDistance = 60;
            const selfCenter1 = player1.x + player1.width / 2;
            const selfCenter2 = player2.x + player2.width / 2;
            const dist = selfCenter2 - selfCenter1;

            if (dist < minDistance) {
                const pushBack = (minDistance - dist) / 2;
                player1.x -= pushBack;
                player2.x += pushBack;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            document.getElementById('p1-health').style.width = `${player1.health}%`;
            document.getElementById('p2-health').style.width = `${player2.health}%`;

            if (player1.health <= 0 || player2.health <= 0) {
                endGame();
            }
        }

        function drawFrame() {
            ctx.save();
            ctx.fillStyle = 'rgba(5, 1, 16, 0.3)';
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            ctx.strokeStyle = '#1a0a3a';
            ctx.lineWidth = 1;
            const gridLines = 10;
            for(let i=0; i<=gridLines; i++) {
                let y = GROUND_Y_LOGIC + (i * (LOGICAL_HEIGHT - GROUND_Y_LOGIC) / gridLines);
                ctx.beginPath();
                ctx.moveTo(0, y); ctx.lineTo(LOGICAL_WIDTH, y);
                ctx.stroke();
            }

            ctx.strokeStyle = '#330066';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10; ctx.shadowColor = '#6600ff';
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y_LOGIC);
            ctx.lineTo(LOGICAL_WIDTH, GROUND_Y_LOGIC);
            ctx.stroke();
            ctx.restore();

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1;

            player1.draw();
            player2.draw();
        }

        function endGame() {
            if(gameOver) return;
            gameOver = true;
            const screen = document.getElementById('winner-screen');
            const textTarget = document.getElementById('winner-text');
            
            let msg = "";
            let color = "#fff";
            if (player1.health === player2.health) {
                msg = "PAREGGIO!";
            } else if (player1.health > player2.health) {
                msg = "GIOCATORE 1 VINCE!";
                color = '#00ffcc';
            } else {
                msg = "GIOCATORE 2 VINCE!";
                color = '#ff00ff';
            }
            
            textTarget.innerText = msg;
            textTarget.style.color = color;
            textTarget.style.textShadow = `0 0 20px ${color}`;
            screen.style.display = 'flex';
        }

        function resetGame() {
            player1.reset();
            player2.reset();
            particles = [];
            gameOver = false;
            document.getElementById('winner-screen').style.display = 'none';
        }
    </script>
</body>
</html>
